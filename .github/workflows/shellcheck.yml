name: Shellcheck

on:
  push:
    branches: [main]
    paths: ['decision-guard/hooks/*.sh']
  pull_request:
    paths: ['decision-guard/hooks/*.sh']

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run shellcheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: decision-guard/hooks
          severity: warning
